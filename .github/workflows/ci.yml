name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: site
          POSTGRES_PASSWORD: site
          POSTGRES_DB: site
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1001

      - name: Generate persona status
        run: go generate ./graph/personas/...

      - name: Generate templates
        run: templ generate

      - name: Check for uncommitted generated file changes
        run: git diff --exit-code -- '*_templ.go' '*_gen.go'

      - name: Build
        run: go build -o site ./cmd/site/

      - name: Test
        run: go test -v -count=1 ./...
        env:
          DATABASE_URL: postgres://site:site@localhost:5432/site?sslmode=disable
