name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: site
          POSTGRES_PASSWORD: site
          POSTGRES_DB: site
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          path: site

      # Checkout sibling repo (go.mod replace directive points to ../eventgraph/go).
      - uses: actions/checkout@v4
        with:
          repository: transpara-ai/eventgraph
          path: eventgraph

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: site/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install npm deps
        run: npm ci
        working-directory: site

      - name: Build CSS
        run: make css
        working-directory: site

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1020

      - name: Verify
        run: make verify
        working-directory: site
        env:
          DATABASE_URL: postgres://site:site@localhost:5432/site?sslmode=disable

      - name: Check for uncommitted generated file changes
        run: git diff --exit-code -- '*_templ.go' '*_gen.go'
        working-directory: site
